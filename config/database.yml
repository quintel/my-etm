default: &default
  adapter: mysql2
  encoding: utf8mb4
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  socket: <%= ENV['DATABASE_HOST'].present? ? nil : '/tmp/mysql.sock' %>

development:
  primary: &development
    <<: *default
    database: <%= ENV.fetch('MYSQL_DATABASE', 'my_etm_development') %>
    host: <%= ENV.fetch('DATABASE_HOST', nil) %>
    username: <%= ENV.fetch('MYSQL_USER', 'root') %>
    password: <%= ENV.fetch('MYSQL_PASSWORD', nil) %>
  queue:
    <<: *development
    database: <%= ENV.fetch('QUEUE_DATABASE', 'my_etm_queue_development') %>
    migrations_paths: db/queue_migrate

test:
  primary:
    <<: *development
    database: my_etm_test
  queue:
    <<: *development
    database: my_etm_queue_test
    migrations_paths: db/queue_migrate

production:
  primary:
    <<: *default
    url: <%= ENV['DATABASE_URL'] %>
  queue:
    <<: *default
    url: <%= ENV['QUEUE_DATABASE_URL'] %>
    migrations_paths: db/queue_migrate

staging:
  primary:
    <<: *default
    url: <%= ENV['DATABASE_URL'] %>
  queue:
    <<: *default
    url: <%= ENV['QUEUE_DATABASE_URL'] %>
    migrations_paths: db/queue_migrate
